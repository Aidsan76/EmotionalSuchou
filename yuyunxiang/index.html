<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMO AI 智能问诊平台</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Firebase SDK (兼容版) -->
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-firestore-compat.js"></script>

    <style>
        .chat-container { height: calc(100vh - 240px); }
        .message-ai { background-color: #ffffff; border: 1px solid #e5e7eb; }
        .message-user { background-color: #2563eb; color: white; }
        .prose p { margin-bottom: 0.5rem; }
        .prose ul { list-style-type: disc; margin-left: 1.25rem; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- 导航栏 -->
    <nav class="bg-blue-600 shadow-md p-4 mb-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center text-white">
            <h1 class="text-xl font-bold flex items-center">🏥 MIMO 智能健康助手</h1>
            <span class="text-xs opacity-75">Cloudflare + Firebase 演示版</span>
        </div>
    </nav>

    <!-- 主容器 -->
    <main class="max-w-4xl mx-auto px-4">
        
        <!-- 聊天区域 -->
        <div id="chat-window" class="chat-container overflow-y-auto mb-4 space-y-4 p-4 rounded-xl">
            <!-- AI 初始语 -->
            <div class="flex justify-start">
                <div class="max-w-[85%] p-4 rounded-2xl shadow-sm message-ai">
                    您好！我是接入了小米 MIMO 大模型的 AI 医生。请告诉我您的症状，我会为您提供初步建议。
                    <p class="text-[10px] text-red-500 mt-2 italic">提示：本系统仅作演示，不可作为真实医疗诊断。</p>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="fixed bottom-6 left-0 right-0 px-4">
            <div class="max-w-4xl mx-auto relative">
                <input type="text" id="userInput" 
                    class="w-full p-4 pr-24 rounded-2xl border border-blue-200 shadow-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    placeholder="描述症状，例如：我最近头晕，且伴有轻微呕吐...">
                <button onclick="handleSend()" id="sendBtn"
                    class="absolute right-2 top-2 bottom-2 bg-blue-600 text-white px-6 rounded-xl hover:bg-blue-700 transition font-bold">
                    问诊
                </button>
            </div>
        </div>
    </main>

    <script>
        // ================= 配置区域 =================
        
        // 1. 替换为你自己的 Firebase 配置 (从 Firebase 控制台复制)
        const firebaseConfig = {
            apiKey: "你的API_KEY",
            authDomain: "mimo-ai-clinic.firebaseapp.com",
            projectId: "mimo-ai-clinic",
            storageBucket: "mimo-ai-clinic.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        // 2. 你的 Cloudflare Worker 链接
        const PROXY_URL = "https://yuyunxiang.aidsan.workers.dev/";

        // ============================================

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // 发送逻辑
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // 禁用输入
            toggleLoading(true);

            // 1. 显示用户消息
            appendMessage('user', text);
            userInput.value = '';

            // 2. 显示加载提示
            const loadingId = 'ai-loading';
            appendLoading(loadingId);

            try {
                // 3. 调用 Cloudflare Worker 中转小米 API
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "mistral-7b-instruct-v0.2", // 小米支持的模型名
                        messages: [
                            { role: "system", content: "你是一个专业的智能问诊医生。请根据症状给出可能的分析、建议挂号的科室。必须再次强调建议仅供参考。回复使用Markdown格式。" },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // 4. 移除加载提示并显示回复
                document.getElementById(loadingId).remove();
                appendMessage('ai', aiResponse);

                // 5. 【加分项】异步保存到 Firebase
                db.collection("consultations").add({
                    user_query: text,
                    ai_response: aiResponse,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => console.log("Records saved to Firebase."));

            } catch (error) {
                console.error(error);
                document.getElementById(loadingId)?.remove();
                appendMessage('ai', "❌ **连接失败**：医生暂时无法接诊。请检查 Cloudflare Worker 是否配置正确，或 API Key 是否过期。");
            } finally {
                toggleLoading(false);
            }
        }

        // 辅助：添加消息
        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = role === 'user' 
                ? `<div class="max-w-[85%] p-4 rounded-2xl shadow-sm message-user">${content}</div>`
                : `<div class="max-w-[85%] p-4 rounded-2xl shadow-sm message-ai prose">${marked.parse(content)}</div>`;
            
            div.innerHTML = bubble;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // 辅助：加载动画
        function appendLoading(id) {
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start';
            div.innerHTML = `<div class="max-w-[85%] p-4 rounded-2xl shadow-sm message-ai italic text-gray-400">AI 医生正在分析症状中...</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function toggleLoading(isLoading) {
            userInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            sendBtn.style.opacity = isLoading ? 0.5 : 1;
        }

        // 支持回车发送
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
