<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能健康助理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .chat-container { height: calc(100vh - 180px); }
        .message-ai { 
            background-color: #ffffff; 
            border: 1px solid #f1f5f9; 
            border-radius: 0 1.25rem 1.25rem 1.25rem; 
        }
        .message-user { 
            background-color: #2563eb; 
            color: white; 
            border-radius: 1.25rem 0 1.25rem 1.25rem; 
        }
        .prose p { margin-bottom: 0.5rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.5rem; }
        .prose strong { color: #1e40af; }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased overflow-hidden">

    <nav class="bg-gradient-to-r from-blue-700 to-blue-500 shadow-md p-4 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center text-white">
            <h1 class="text-lg font-semibold tracking-wide">AI智能健康助理</h1>
            <div class="flex items-center gap-3">
                <button id="historyBtn" class="text-sm bg-white/10 hover:bg-white/20 border border-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm transition-all flex items-center gap-1 cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    历史记录
                </button>
                <span class="text-xs bg-white/20 border border-white/30 px-3 py-1.5 rounded-full backdrop-blur-sm">Health-AI</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6 relative">
        <div id="chat-window" class="chat-container overflow-y-auto space-y-6 p-2 mb-24 pb-8">
            <div class="flex justify-start">
                <div class="max-w-[85%] p-4 shadow-sm message-ai">
                    <p class="text-sm font-semibold text-blue-700 mb-2">AI 健康助手</p>
                    <p class="text-slate-700">您好！我是您的专属 AI 智能健康助理。请详细描述您的症状或不适，我将为您进行初步的分析并提供就医建议。</p>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-30">
            <div class="max-w-4xl mx-auto flex gap-3 items-center">
                <input type="text" id="userInput" 
                    class="flex-grow p-3.5 rounded-xl border border-slate-300 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-slate-700 placeholder-slate-400 shadow-inner"
                    placeholder="请输入您的症状描述...">
                <button id="sendBtn" class="bg-blue-600 text-white px-8 py-3.5 rounded-xl hover:bg-blue-700 active:transform active:scale-95 transition-all font-medium shadow-md flex-shrink-0">
                    发送
                </button>
            </div>
        </div>
    </main>

    <div id="historySidebar" class="fixed inset-y-0 right-0 w-80 sm:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-[60] flex flex-col border-l border-slate-200">
        <div class="p-4 bg-blue-50 border-b border-blue-100 flex justify-between items-center">
            <h2 class="font-bold text-blue-800 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                问诊历史
            </h2>
            <button id="closeHistoryBtn" class="text-blue-400 hover:text-blue-700 transition-colors p-1 rounded-md hover:bg-blue-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
            </div>
    </div>

    <div id="historyOverlay" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[50] hidden opacity-0 transition-opacity duration-300"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        // 增加引入 getDocs, query, orderBy
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5UiP5tmofj6BJBNr-zHnqkOLl9lCxHOE",
            authDomain: "mimo-ai-clinic.firebaseapp.com",
            projectId: "mimo-ai-clinic",
            storageBucket: "mimo-ai-clinic.firebasestorage.app",
            messagingSenderId: "174616810320",
            appId: "1:174616810320:web:a3c96f4c1517ef69c19255",
            measurementId: "G-F12NEBXKKG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const PROXY_URL = "https://yuyunxiang.aidsan.workers.dev/";

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // ==== 新增：历史记录相关 DOM 与逻辑 ====
        const historyBtn = document.getElementById('historyBtn');
        const closeHistoryBtn = document.getElementById('closeHistoryBtn');
        const historySidebar = document.getElementById('historySidebar');
        const historyOverlay = document.getElementById('historyOverlay');
        const historyList = document.getElementById('historyList');

        // 控制侧边栏的开关
        function toggleHistory(show) {
            if (show) {
                historyOverlay.classList.remove('hidden');
                // 使用 setTimeout 让 display:block 生效后再执行透明度动画
                setTimeout(() => {
                    historyOverlay.classList.remove('opacity-0');
                    historySidebar.classList.remove('translate-x-full');
                }, 10);
                loadHistory(); // 打开时实时拉取数据
            } else {
                historyOverlay.classList.add('opacity-0');
                historySidebar.classList.add('translate-x-full');
                setTimeout(() => {
                    historyOverlay.classList.add('hidden');
                }, 300); // 等待动画结束
            }
        }

        historyBtn.addEventListener('click', () => toggleHistory(true));
        closeHistoryBtn.addEventListener('click', () => toggleHistory(false));
        historyOverlay.addEventListener('click', () => toggleHistory(false));

        // 从数据库拉取并渲染历史记录
        async function loadHistory() {
            historyList.innerHTML = `
                <div class="flex justify-center items-center h-32">
                    <svg class="animate-spin h-6 w-6 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>`;

            try {
                // 构建查询：按照 timestamp 字段降序（最新的在最上面）
                const q = query(collection(db, "consultations"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    historyList.innerHTML = '<div class="text-center text-slate-400 text-sm mt-10">暂无问诊记录</div>';
                    return;
                }

                let html = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    // 处理时间戳
                    let timeString = '刚刚';
                    if (data.timestamp) {
                        const date = data.timestamp.toDate();
                        timeString = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                    }

                   // 增加容错处理：如果 answer 不存在，给一个默认提示
const rawAnswer = data.answer || "暂无回答内容";
const plainAnswer = rawAnswer.replace(/[#*`_]/g, '').substring(0, 80) + (rawAnswer.length > 80 ? '...' : '');
                    html += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                            <div class="text-xs text-slate-400 mb-2 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${timeString}
                            </div>
                            <div class="text-sm font-bold text-slate-800 mb-1 line-clamp-2">
                                <span class="text-blue-600 mr-1">问：</span>${data.question}
                            </div>
                            <div class="text-xs text-slate-500 line-clamp-3">
                                <span class="text-emerald-600 mr-1">答：</span>${plainAnswer}
                            </div>
                        </div>
                    `;
                });
                historyList.innerHTML = html;

            } catch (error) {
                console.error("加载历史记录失败:", error);
                historyList.innerHTML = '<div class="text-center text-red-400 text-sm mt-10">加载失败，请检查网络或数据库连接</div>';
            }
        }
        // ==== 历史记录逻辑结束 ====

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            setLoading(true);

            const loadingId = 'loading-' + Date.now();
            appendLoading(loadingId);

            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "deepseek-ai/DeepSeek-V3", 
                        messages: [
                            { 
                                role: "system", 
                                content: "你是一位专业的在线医生。请根据用户的描述分析可能的健康问题，给出初步建议和挂号科室。声明：AI内容仅供参考。" 
                            },
                            { role: "user", content: text }
                        ],
                        stream: false
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || "API 返回错误");
                }

                const aiResult = data.choices[0].message.content;

                document.getElementById(loadingId).remove();
                appendMessage('ai', aiResult);

                // 保存到 Firebase
                await addDoc(collection(db, "consultations"), {
                    question: text,
                    answer: aiResult,
                    timestamp: serverTimestamp()
                });

            } catch (error) {
                console.error("Error Detail:", error);
                document.getElementById(loadingId)?.remove();
                appendMessage('ai', `[服务繁忙] ${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            if (role === 'user') {
                div.innerHTML = `<div class="max-w-[85%] p-4 shadow-md message-user leading-relaxed">${content}</div>`;
            } else {
                div.innerHTML = `
                    <div class="max-w-[85%] p-4 shadow-sm message-ai prose text-slate-700">
                        <div class="text-sm font-semibold text-blue-700 mb-2 border-b border-slate-100 pb-1">AI 健康助手</div>
                        ${marked.parse(content)}
                    </div>`;
            }
            
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendLoading(id) {
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start';
            div.innerHTML = `<div class="max-w-[85%] px-5 py-4 shadow-sm message-ai text-slate-400 text-sm flex items-center gap-2">
                                <svg class="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                正在分析症状，请稍候...
                             </div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function setLoading(isLoading) {
            userInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            if (isLoading) {
                sendBtn.classList.add('opacity-60', 'cursor-not-allowed');
                sendBtn.classList.remove('hover:bg-blue-700', 'active:transform', 'active:scale-95');
            } else {
                sendBtn.classList.remove('opacity-60', 'cursor-not-allowed');
                sendBtn.classList.add('hover:bg-blue-700', 'active:transform', 'active:scale-95');
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
