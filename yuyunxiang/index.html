<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMO AI 智能问诊平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .chat-container { height: calc(100vh - 200px); }
        .message-ai { background-color: #ffffff; border: 1px solid #e5e7eb; border-radius: 1rem 1rem 1rem 0; }
        .message-user { background-color: #2563eb; color: white; border-radius: 1rem 1rem 0 1rem; }
        .prose p { margin-bottom: 0.5rem; }
        .prose ul { list-style-type: disc; margin-left: 1.25rem; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-blue-600 shadow-lg p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center text-white">
            <h1 class="text-xl font-bold flex items-center">🏥 MIMO 智能健康助手</h1>
            <span class="text-[10px] bg-blue-500 px-2 py-1 rounded">Model: mimo-v2-pro</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <div id="chat-window" class="chat-container overflow-y-auto space-y-4 p-4 mb-20">
            <div class="flex justify-start">
                <div class="max-w-[85%] p-4 shadow-sm message-ai">
                    <p class="font-bold text-blue-600 mb-1">AI 助手：</p>
                    您好！我是接入了小米 MIMO 大模型的 AI 医生。请描述您的症状。
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-2xl">
            <div class="max-w-4xl mx-auto flex gap-2">
                <input type="text" id="userInput" 
                    class="flex-grow p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="请输入症状描述...">
                <button id="sendBtn" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition-all font-bold shadow-md">发送</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        // 1. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyC5UiP5tmofj6BJBNr-zHnqkOLl9lCxHOE",
            authDomain: "mimo-ai-clinic.firebaseapp.com",
            projectId: "mimo-ai-clinic",
            storageBucket: "mimo-ai-clinic.firebasestorage.app",
            messagingSenderId: "174616810320",
            appId: "1:174616810320:web:a3c96f4c1517ef69c19255",
            measurementId: "G-F12NEBXKKG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. Cloudflare Proxy 地址
        const PROXY_URL = "https://yuyunxiang.aidsan.workers.dev/";

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

// ... 其他代码保持不变 ...

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            setLoading(true);

            const loadingId = 'loading-' + Date.now();
            appendLoading(loadingId);

            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "deepseek-chat", // 换成 DeepSeek 的模型名
                        messages: [
                            { 
                                role: "system", 
                                content: "你是一位专业的在线医生。请根据用户的描述分析可能的健康问题，并给出初步建议。必须包含【建议就诊科室】。结尾声明：AI生成内容仅供参考，不作为最终医疗诊断。" 
                            },
                            { role: "user", content: text }
                        ],
                        stream: false // 确保关闭流式传输以匹配当前代码逻辑
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || "API 返回错误");
                }

                const aiResult = data.choices[0].message.content;

                document.getElementById(loadingId).remove();
                appendMessage('ai', aiResult);

                // 保存到 Firebase
                await addDoc(collection(db, "consultations"), {
                    question: text,
                    answer: aiResult,
                    timestamp: serverTimestamp()
                });

            } catch (error) {
                console.error("Error Detail:", error);
                document.getElementById(loadingId)?.remove();
                appendMessage('ai', `❌ **服务繁忙**：${error.message}`);
            } finally {
                setLoading(false);
            }
        }

// ... 其他代码保持不变 ...

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = role === 'user' 
                ? `<div class="max-w-[85%] p-4 shadow-md message-user">${content}</div>`
                : `<div class="max-w-[85%] p-4 shadow-sm message-ai prose">${marked.parse(content)}</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendLoading(id) {
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start';
            div.innerHTML = `<div class="max-w-[85%] p-4 shadow-sm message-ai italic text-slate-400">正在接入 MIMO 分析中...</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function setLoading(isLoading) {
            userInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            sendBtn.style.opacity = isLoading ? "0.5" : "1";
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
