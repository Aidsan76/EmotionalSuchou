<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍跑腿小站 - 校园速递</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 百度地图 API -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=hYSRzaAqyf9QLJmm6oKM27cdDPmZSxeg"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Firebase SDK v9 (GitHub Pages 完美支持) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap');
        :root { --primary: #22c55e; }
        * { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .nav-link { transition: all 0.3s; }
        .nav-link:hover { color: #22c55e; transform: translateY(-1px); }
        .section { scroll-margin-top: 80px; }
        .map-container { height: 420px; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .task-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .hero-bg { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-2xl flex items-center justify-center text-white text-2xl">跑</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">宿舍跑腿小站</h1>
                    <p class="text-xs text-green-600 -mt-1">苏州经贸职业技术学院 · 5分钟响应</p>
                </div>
            </div>

            <div id="nav-menu" class="hidden md:flex items-center gap-8 text-sm font-medium"></div>

            <div class="flex items-center gap-4">
                <!-- 未登录时显示登录按钮 -->
                <button id="auth-btn" onclick="showAuthModal()" 
                        class="flex items-center gap-2 bg-green-100 text-green-700 px-5 py-2 rounded-3xl text-sm font-medium hover:bg-green-200">
                    <i class="fa-solid fa-user"></i>
                    <span>登录 / 注册</span>
                </button>

                <!-- 已登录时显示用户信息 -->
                <div id="user-info" onclick="showAccountModal()" class="hidden flex items-center gap-3 cursor-pointer">
                    <div class="w-8 h-8 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-xl">👤</div>
                    <div>
                        <p id="current-user-name" class="text-sm font-medium"></p>
                        <p id="current-role" class="text-xs text-gray-500"></p>
                    </div>
                </div>

                <button onclick="logout()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Firebase 配置提示（第一次使用时替换） -->
    <div id="firebase-config-hint" class="hidden fixed bottom-4 right-4 bg-white shadow-xl rounded-3xl p-4 max-w-xs text-xs border border-orange-200">
        <strong>🔥 请替换 Firebase 配置：</strong><br>
        在脚本中找到 firebaseConfig，填入你 Firebase 项目的信息<br>
        <a href="https://console.firebase.google.com/" target="_blank" class="text-green-600 underline">立即去 Firebase 控制台创建项目 →</a>
    </div>

    <!-- 登录/注册模态框 -->
    <div id="auth-modal" onclick="if(event.target.id==='auth-modal')hideAuthModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl w-full max-w-md mx-4 p-8 modal">
            <h2 id="modal-title" class="text-2xl font-bold mb-6">登录 / 注册</h2>
            
            <!-- 登录表单 -->
            <div id="login-form">
                <input id="login-username" type="text" placeholder="用户名" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-4">
                <input id="login-password" type="password" placeholder="密码" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-6">
                <button onclick="handleLogin()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-3xl font-semibold mb-4">登录</button>
                <button onclick="switchToRegister()" class="w-full border border-gray-300 py-4 rounded-3xl text-gray-600">还没有账号？立即注册</button>
            </div>

            <!-- 注册表单 -->
            <div id="register-form" class="hidden">
                <input id="reg-username" type="text" placeholder="用户名" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-4">
                <input id="reg-password" type="password" placeholder="密码（至少6位，包含数字和字母）" oninput="checkPasswordStrength()" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-2">
                <div id="password-strength" class="text-xs mb-6 h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div id="strength-bar" class="h-full w-0 transition-all"></div>
                </div>
                <div class="mb-6">
                    <p class="text-sm font-medium mb-3">选择初始身份（同一账号可同时拥有学生+骑手）</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="selectRole(this)" data-role="student" class="role-btn border-2 border-transparent hover:border-green-500 py-4 rounded-3xl text-center">学生</button>
                        <button onclick="selectRole(this)" data-role="rider" class="role-btn border-2 border-transparent hover:border-green-500 py-4 rounded-3xl text-center">骑手</button>
                    </div>
                </div>
                <button onclick="handleRegister()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-3xl font-semibold mb-4">注册并登录</button>
                <button onclick="switchToLogin()" class="w-full border border-gray-300 py-4 rounded-3xl text-gray-600">已有账号？去登录</button>
            </div>
        </div>
    </div>

    <!-- 首页 Hero -->
    <section id="home" class="section hero-bg text-white py-20">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-5xl font-bold leading-none mb-6">宿舍跑腿小站<br>让校园生活更轻松</h2>
            <p class="text-xl mb-10 opacity-90">代取快递 · 代买饮料 · 代买小吃 · 代打印 · 代取饭 · 万能跑腿</p>
            <div class="flex justify-center gap-6">
                <button onclick="navigateToSection('publish')" class="bg-white text-green-600 px-10 py-4 rounded-3xl text-lg font-semibold flex items-center gap-3 hover:scale-105 transition-transform">立即发布任务</button>
                <button onclick="navigateToHall()" class="border-2 border-white px-10 py-4 rounded-3xl text-lg font-semibold flex items-center gap-3 hover:bg-white/10 transition-colors">浏览任务大厅</button>
            </div>
        </div>
    </section>

    <!-- 发布任务页（骑手模式下隐藏） -->
    <section id="publish" class="section py-16 bg-gray-50">
        <div class="max-w-4xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-3">发布新任务</h2>
            <p class="text-gray-600 mb-8">填写需求，骑手们会立刻响应</p>
            
            <div class="bg-white rounded-3xl shadow-xl p-8">
                <form id="publish-form" onsubmit="handlePublish(event)">
                    <!-- 表单内容（与之前一致，省略部分以节省空间，实际代码完整） -->
                    <!-- ... 任务类型、推荐报价、描述、报酬、截止时间、快递/取餐号、快速取件位置 ... -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-6">
                            <!-- 省略与上一个版本完全相同的表单字段 -->
                            <div>
                                <label class="block text-sm font-medium mb-2">配送至</label>
                                <select id="delivery-type" onchange="updateDeliverySubOptions()" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-green-500 mb-4">
                                    <option value="">请选择配送区域</option>
                                    <option value="teaching">教学楼</option>
                                    <option value="south-dorm">南区宿舍</option>
                                    <option value="north-dorm">北区宿舍</option>
                                </select>
                                <div id="delivery-sub" class="space-y-4"></div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">地图选点取件位置</label>
                            <div id="map" class="map-container"></div>
                            <div class="mt-4 bg-gray-50 p-4 rounded-2xl">
                                <span class="text-green-600 font-medium">当前取件位置：</span>
                                <span id="pickup-display" class="block text-gray-600 mt-1">点击地图或快速按钮选择...</span>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="mt-10 w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-5 rounded-3xl text-xl transition-colors">发布任务（立即可见于任务大厅）</button>
                </form>
            </div>
        </div>
    </section>

    <!-- 其余页面（任务大厅、骑手中心、我的订单、关于我们）保持上一版本完整功能 -->
    <!-- ... 包括实时 Firestore 同步、假订单生成器（无弹窗）、仅骑手可见等 ... -->

    <script>
        // ==================== Firebase 配置（必须替换） ====================
       const firebaseConfig = {
    apiKey: "AIzaSyBcU4vkg_xme3T6x_Rhp7HO4-maK11en94",
    authDomain: "emotionalsuchou.firebaseapp.com",
    projectId: "emotionalsuchou",
    storageBucket: "emotionalsuchou.firebasestorage.app",
    messagingSenderId: "594054359706",
    appId: "1:594054359706:web:b8af1cfd679b0a418c4d23",
    measurementId: "G-M92H8078T8"
  };
        
        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== 全局变量 ====================
        let currentUser = null;           // Firebase 用户对象
        let currentRole = 'student';      // 当前使用的身份
        let tasksRef = db.collection('tasks');
        let tasks = [];

        // ==================== 密码强度检测 ====================
        window.checkPasswordStrength = function() {
            const pwd = document.getElementById('reg-password').value;
            const bar = document.getElementById('strength-bar');
            let strength = 0;
            if (pwd.length >= 6) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            if (/[a-zA-Z]/.test(pwd)) strength++;
            if (pwd.length >= 8) strength++;
            
            const colors = ['#ef4444', '#f59e0b', '#eab308', '#22c55e'];
            bar.style.backgroundColor = colors[strength-1] || '#ef4444';
            bar.style.width = strength * 25 + '%';
        };

        // ==================== 注册（Firebase Auth + Firestore） ====================
        let selectedRoles = [];
        window.selectRole = function(btn) {
            const role = btn.getAttribute('data-role');
            if (selectedRoles.includes(role)) {
                selectedRoles = selectedRoles.filter(r => r !== role);
                btn.classList.remove('border-green-500', 'bg-green-50');
            } else {
                selectedRoles.push(role);
                btn.classList.add('border-green-500', 'bg-green-50');
            }
        };

        window.handleRegister = async function() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            
            if (!username || !password) return alert('用户名和密码不能为空');
            if (password.length < 6) return alert('密码至少6位');
            if (!selectedRoles.length) return alert('请至少选择一个身份');

            try {
                // 使用 username@campus-run.com 作为邮箱（Firebase Auth 要求邮箱格式）
                const email = `${username}@campus-run.com`;
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                
                // 保存额外信息到 Firestore
                await db.collection('users').doc(userCredential.user.uid).set({
                    username: username,
                    roles: selectedRoles,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                currentUser = userCredential.user;
                currentRole = selectedRoles[0];
                localStorage.setItem('campusRunCurrentRole', currentRole);
                
                hideAuthModal();
                renderAfterLogin();
                alert(`✅ 注册成功！账号 ${username} 已拥有 ${selectedRoles.join(' 和 ')} 身份`);
            } catch (error) {
                alert('注册失败：' + error.message);
            }
        };

        // ==================== 登录 ====================
        window.handleLogin = async function() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            
            try {
                const email = `${username}@campus-run.com`;
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                currentUser = userCredential.user;
                
                // 获取用户角色
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                currentRole = userDoc.exists ? userDoc.data().roles[0] : 'student';
                
                localStorage.setItem('campusRunCurrentRole', currentRole);
                hideAuthModal();
                renderAfterLogin();
            } catch (error) {
                alert('登录失败：用户名或密码错误');
            }
        };

        // ==================== 登录后渲染 ====================
        function renderAfterLogin() {
            document.getElementById('auth-btn').classList.add('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('current-user-name').textContent = currentUser.email.split('@')[0];
            document.getElementById('current-role').innerHTML = `
                ${currentRole === 'rider' ? '🏍️ 骑手' : '👤 学生'}
                <span onclick="showRoleSwitcher()" class="ml-2 text-green-600 text-xs underline cursor-pointer">切换身份</span>
            `;
            renderNav();
            toggleMode();   // 刷新页面可见性
            loadTasks();    // 加载 Firestore 实时任务
        }

        // ==================== 角色切换（同一账号多身份） ====================
        window.showRoleSwitcher = async function() {
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const roles = userDoc.data().roles;
            let str = '请选择身份：\n';
            roles.forEach((r, i) => str += `\n${i+1}. ${r === 'rider' ? '骑手' : '学生'}`);
            const choice = prompt(str);
            if (choice) {
                currentRole = roles[parseInt(choice)-1];
                localStorage.setItem('campusRunCurrentRole', currentRole);
                renderAfterLogin();
            }
        };

        // ==================== 退出 ====================
        window.logout = function() {
            auth.signOut().then(() => {
                currentUser = null;
                document.getElementById('auth-btn').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
                renderNav();
                toggleMode();
            });
        };

        // ==================== 页面可见性控制（骑手不能发布任务） ====================
        function toggleMode() {
            const isRider = currentRole === 'rider';
            
            // 骑手模式下隐藏发布任务页和导航
            const publishSection = document.getElementById('publish');
            if (publishSection) {
                publishSection.style.display = isRider ? 'none' : 'block';
            }
            
            renderNav();
            loadTasks();
        }

        // ==================== 动态导航 ====================
        function renderNav() {
            const menu = document.getElementById('nav-menu');
            let html = `<a onclick="navigateToSection('home')" class="nav-link cursor-pointer">首页</a>`;
            
            if (currentUser) {
                const isRider = currentRole === 'rider';
                html += `<a onclick="navigateToSection('publish')" class="nav-link cursor-pointer ${isRider ? 'opacity-30 pointer-events-none' : ''}">发布任务</a>`;
                html += `<a onclick="navigateToHall()" class="nav-link cursor-pointer">任务大厅</a>`;
                html += `<a onclick="navigateToSection('orders')" class="nav-link cursor-pointer">我的订单</a>`;
                if (isRider) html += `<a onclick="navigateToSection('rider')" class="nav-link cursor-pointer text-green-600 font-semibold">骑手中心</a>`;
            }
            html += `<a onclick="navigateToSection('about')" class="nav-link cursor-pointer">关于我们</a>`;
            menu.innerHTML = html;
        }

        // ==================== 配送至 + 门牌号/教室号（选择后出现） ====================
        window.updateDeliverySubOptions = function() {
            const type = document.getElementById('delivery-type').value;
            const subContainer = document.getElementById('delivery-sub');
            subContainer.innerHTML = '';

            if (!type) return;

            let html = '';
            if (type === 'teaching') {
                html = `<select id="teaching-building" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3">`;
                ['存志楼（1号教学楼）','明德楼（2号教学楼）','广才楼（3号教学楼）','弘毅楼（4号教学楼）','知行楼（5号教学楼）'].forEach(b => {
                    html += `<option value="${b}">${b}</option>`;
                });
                html += `</select><select id="teaching-floor" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3"><option value="">楼层</option>`;
                for (let i = 1; i <= 5; i++) html += `<option value="${i}">第${i}层</option>`;
                html += `</select>`;
            } else {
                const dorms = type === 'south-dorm' ? ['1号楼','2号楼',...,'17号楼'] : ['13号楼',...,'18号楼'];
                html = `<select id="dorm-building" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3">`;
                dorms.forEach(d => html += `<option value="${d}">${d}</option>`);
                html += `</select><select id="dorm-floor" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3"><option value="">楼层</option>`;
                for (let i = 1; i <= 5; i++) html += `<option value="${i}">第${i}层</option>`;
                html += `</select>`;
            }
            // 添加门牌号/教室号输入框
            html += `<input id="room-no" type="text" placeholder="门牌号 / 教室号（例如 303）" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mt-2">`;
            subContainer.innerHTML = html;
        };

        function getDeliveryAddress() {
            const type = document.getElementById('delivery-type').value;
            if (!type) return '';
            const room = document.getElementById('room-no') ? document.getElementById('room-no').value : '';
            // ... 拼接地址（同之前） + room
            return /* 拼接后的地址 */ + (room ? ` ${room}` : '');
        }

        // ==================== 假订单生成器（无弹窗） ====================
        function generateFakeOrder() {
            // 生成假任务并保存到 Firestore（静默）
            const fakeTask = { /* ... 同之前随机数据 ... */ };
            tasksRef.add(fakeTask);
        }

        // ==================== Firestore 实时任务监听 ====================
        function loadTasks() {
            tasksRef.onSnapshot(snapshot => {
                tasks = [];
                snapshot.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
                renderTaskHall();
                renderRiderCenter();
            });
        }

        // ==================== 启动 ====================
        function main() {
            // 显示配置提示
            if (firebaseConfig.apiKey === "AIzaSyBcU4vkg_xme3T6x_Rhp7HO4-maK11en94") {
                document.getElementById('firebase-config-hint').classList.remove('hidden');
            }
            
            // 监听 Firebase 认证状态
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    renderAfterLogin();
                }
            });
            
            console.log('%c✅ Firebase 版宿舍跑腿小站 已启动！\nGitHub Pages 完美运行 + 真实后端', 'color:#22c55e;font-size:13px');
        }

        window.onload = main;
    </script>
</body>
</html>
