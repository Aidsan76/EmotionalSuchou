<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍跑腿小站 - 校园速递</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://api.map.baidu.com/api?v=3.0&ak=hYSRzaAqyf9QLJmm6oKM27cdDPmZSxeg"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap');
        :root { --primary: #22c55e; }
        * { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .nav-link { transition: all 0.3s; cursor: pointer; }
        .nav-link:hover { color: #22c55e; transform: translateY(-1px); }
        .section { scroll-margin-top: 80px; }
        .map-container { height: 420px; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .task-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .hero-bg { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .conditional { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-2xl flex items-center justify-center text-white text-2xl">跑</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">宿舍跑腿小站</h1>
                    <p class="text-xs text-green-600 -mt-1">苏州经贸职业技术学院 · 5分钟响应</p>
                </div>
            </div>

            <div id="nav-menu" class="hidden md:flex items-center gap-8 text-sm font-medium"></div>

            <div class="flex items-center gap-4">
                <button id="auth-btn" onclick="showAuthModal()" class="flex items-center gap-2 bg-green-100 text-green-700 px-5 py-2 rounded-3xl text-sm font-medium hover:bg-green-200">
                    <i class="fa-solid fa-user"></i><span>登录 / 注册</span>
                </button>

                <div id="user-info" onclick="showRoleDropdown()" class="hidden flex items-center gap-3 cursor-pointer">
                    <div class="w-8 h-8 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-xl">👤</div>
                    <div>
                        <p id="current-user-name" class="text-sm font-medium"></p>
                        <div class="flex items-center gap-1 text-xs">
                            <span id="current-role-badge" class="px-2 py-px bg-green-100 text-green-700 rounded-full"></span>
                            <span class="text-gray-400">▼</span>
                        </div>
                    </div>
                </div>

                <button onclick="logout()" class="text-gray-400 hover:text-gray-600 ml-2"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>
    </nav>

    <!-- 角色切换菜单 -->
    <div id="role-dropdown" onclick="if(event.target.id==='role-dropdown')hideRoleDropdown()" class="hidden fixed inset-0 bg-black/30 flex items-start justify-end pt-16 pr-6 z-[9999]">
        <div class="bg-white rounded-3xl shadow-xl w-64 py-2">
            <div onclick="switchToRole('student')" class="px-6 py-3 hover:bg-gray-100 flex items-center gap-3 cursor-pointer">👤 切换为学生模式</div>
            <div onclick="switchToRole('rider')" class="px-6 py-3 hover:bg-gray-100 flex items-center gap-3 cursor-pointer">🏍️ 切换为骑手模式</div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div id="auth-modal" onclick="if(event.target.id==='auth-modal')hideAuthModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl w-full max-w-md mx-4 p-8">
            <h2 id="modal-title" class="text-2xl font-bold mb-6">登录 / 注册</h2>
            <div id="login-form">
                <input id="login-username" type="text" placeholder="用户名" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-green-500">
                <input id="login-password" type="password" placeholder="密码" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-green-500">
                <button onclick="handleLogin()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-3xl font-semibold mb-4">登录</button>
                <button onclick="switchToRegister()" class="w-full border border-gray-300 py-4 rounded-3xl text-gray-600">还没有账号？立即注册</button>
            </div>
            <div id="register-form" class="hidden">
                <input id="reg-username" type="text" placeholder="用户名" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-green-500">
                <input id="reg-password" type="password" placeholder="密码（至少6位）" oninput="checkPasswordStrength()" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-2 focus:outline-none focus:border-green-500">
                <div id="password-strength" class="text-xs mb-6 h-2 bg-gray-200 rounded-full overflow-hidden"><div id="strength-bar" class="h-full w-0 transition-all"></div></div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button onclick="selectRole(this)" data-role="student" class="role-btn border-2 border-transparent hover:border-green-500 py-4 rounded-3xl text-center">学生</button>
                    <button onclick="selectRole(this)" data-role="rider" class="role-btn border-2 border-transparent hover:border-green-500 py-4 rounded-3xl text-center">骑手</button>
                </div>
                <button onclick="handleRegister()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-3xl font-semibold mb-4">注册并登录</button>
                <button onclick="switchToLogin()" class="w-full border border-gray-300 py-4 rounded-3xl text-gray-600">已有账号？去登录</button>
            </div>
        </div>
    </div>

    <!-- 首页 Hero -->
    <section id="home" class="section hero-bg text-white py-20">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-5xl font-bold leading-none mb-6">宿舍跑腿小站<br>让校园生活更轻松</h2>
            <div class="flex justify-center gap-6">
                <button onclick="navigateToSection('publish')" class="bg-white text-green-600 px-10 py-4 rounded-3xl text-lg font-semibold hover:scale-105 transition-transform">立即发布任务</button>
                <button onclick="navigateToSection('hall')" class="border-2 border-white px-10 py-4 rounded-3xl text-lg font-semibold hover:bg-white/10 transition-colors">浏览任务大厅</button>
            </div>
        </div>
    </section>

    <!-- 发布任务页 -->
    <section id="publish" class="section py-16 bg-gray-50">
        <div class="max-w-4xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-8">发布新任务</h2>
            <div class="bg-white rounded-3xl shadow-xl p-8">
                <form id="publish-form" onsubmit="handlePublish(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">任务类型</label>
                                <select id="task-type" onchange="updateConditionalFields()" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-green-500">
                                    <option value="代取快递">代取快递</option>
                                    <option value="代买饮料">代买饮料</option>
                                    <option value="代取饭">代取饭</option>
                                    <option value="其他跑腿">其他跑腿</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">物品描述/备注</label>
                                <textarea id="task-desc" rows="2" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-green-500" placeholder="例如：一个中型包裹"></textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-sm font-medium mb-2">报酬 (元)</label><input id="reward" type="number" value="2" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">期限</label>
                                    <select id="deadline" class="w-full border border-gray-300 rounded-2xl px-5 py-4"><option value="1小时">1小时</option><option value="2小时">2小时</option></select>
                                </div>
                            </div>
                            <div id="express-field" class="conditional">
                                <label class="block text-sm font-medium mb-2">快递单号</label>
                                <input id="express-no" type="text" class="w-full border border-gray-300 rounded-2xl px-5 py-4" placeholder="快递单号">
                            </div>
                            <div id="meal-field" class="conditional">
                                <label class="block text-sm font-medium mb-2">取餐号</label>
                                <input id="meal-no" type="text" class="w-full border border-gray-300 rounded-2xl px-5 py-4" placeholder="取餐号">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">取件点</label>
                                <div class="flex flex-wrap gap-2 mb-2">
                                    <button type="button" onclick="quickPickup('顺丰快递点')" class="text-xs px-3 py-1 bg-gray-100 rounded-full">顺丰</button>
                                    <button type="button" onclick="quickPickup('经贸一食堂')" class="text-xs px-3 py-1 bg-gray-100 rounded-full">一食堂</button>
                                    <button type="button" onclick="quickPickup('瑞幸咖啡')" class="text-xs px-3 py-1 bg-gray-100 rounded-full">瑞幸</button>
                                </div>
                                <span id="pickup-display" class="text-sm text-green-600 font-bold italic">请点击地图或快速按钮选择</span>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">送到哪里</label>
                                <select id="delivery-type" onchange="updateDeliverySubOptions()" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-2">
                                    <option value="">请选择区域</option>
                                    <option value="south-dorm">南区宿舍</option>
                                    <option value="north-dorm">北区宿舍</option>
                                    <option value="teaching">教学楼</option>
                                </select>
                                <div id="delivery-sub" class="space-y-2"></div>
                            </div>
                        </div>
                        <div id="map" class="map-container"></div>
                    </div>
                    <button type="submit" class="mt-8 w-full bg-green-500 hover:bg-green-600 text-white font-bold py-5 rounded-3xl text-xl transition-all shadow-lg">确认发布任务</button>
                </form>
            </div>
        </div>
    </section>

    <!-- 任务大厅 -->
    <section id="hall" class="section py-16 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-8">任务大厅</h2>
            <div id="task-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-gray-400">正在同步云端订单...</p>
            </div>
        </div>
    </section>

    <!-- 骑手中心 -->
    <section id="rider" class="section py-16 bg-gray-50 hidden">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-4 text-green-700">🏍️ 骑手接单大厅</h2>
            <button onclick="generateFakeOrder()" class="mb-8 bg-orange-500 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md hover:bg-orange-600 transition-all">
                <i class="fa-solid fa-plus mr-2"></i>生成一条演示订单 (所有人可见)
            </button>
            <div id="rider-task-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-gray-400">正在搜索可接订单...</p>
            </div>
        </div>
    </section>

    <!-- 我的订单 -->
    <section id="orders" class="section py-16 bg-white hidden">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-8">我的订单</h2>
            <div id="my-orders-list" class="space-y-4"></div>
        </div>
    </section>

    <script>
        // Firebase 配置 (保留你的原有配置)
        const firebaseConfig = {
            apiKey: "AIzaSyBcU4vkg_xme3T6x_Rhp7HO4-maK11en94",
            authDomain: "emotionalsuchou.firebaseapp.com",
            projectId: "emotionalsuchou",
            storageBucket: "emotionalsuchou.firebasestorage.app",
            messagingSenderId: "594054359706",
            appId: "1:594054359706:web:b8af1cfd679b0a418c4d23",
            measurementId: "G-M92H8078T8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const tasksRef = db.collection('tasks');

        let currentUser = null;
        let currentRole = 'student';
        let selectedPickup = "未选择";

        // 核心监听：实时从 Firebase 获取数据
        function startSync() {
            // 监听所有状态为 'available' (待接单) 的任务
            tasksRef.where('status', '==', 'available').orderBy('createdAt', 'desc')
                .onSnapshot(snapshot => {
                    renderCards(snapshot, 'task-list');
                    renderCards(snapshot, 'rider-task-list');
                }, err => {
                    console.log("提示：如果看到此错误，请去Firestore控制台为createdAt创建索引", err);
                });
        }

        // 渲染卡片逻辑
        function renderCards(snapshot, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="col-span-full py-10 text-center text-gray-400 bg-gray-50 rounded-3xl border-2 border-dashed">暂无待接订单</div>';
                return;
            }

            let html = '';
            snapshot.forEach(doc => {
                const t = doc.data();
                const id = doc.id;
                html += `
                <div class="task-card bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">${t.type}</span>
                        <span class="text-2xl font-bold text-green-600">￥${t.reward}</span>
                    </div>
                    <div class="space-y-3 mb-6">
                        <p class="text-sm"><span class="text-gray-400 italic">取件：</span><span class="font-medium">${t.pickup}</span></p>
                        <p class="text-sm"><span class="text-gray-400 italic">送至：</span><span class="font-medium">${t.delivery}</span></p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl text-xs text-gray-500 mb-6">
                        备注：${t.desc || '无'}<br>
                        ${t.mealNo ? `取餐号：${t.mealNo}` : ''}
                        ${t.expressNo ? `单号：${t.expressNo}` : ''}
                    </div>
                    <button onclick="takeOrder('${id}')" class="w-full bg-gray-900 text-white py-3 rounded-2xl font-bold hover:bg-green-600 transition-all">
                        ${currentRole === 'rider' ? '立即接单' : '查看详情'}
                    </button>
                </div>`;
            });
            container.innerHTML = html;
        }

        // 发布任务存入 Firebase
        window.handlePublish = async function(e) {
            e.preventDefault();
            if (!currentUser) return alert('请先登录');
            if (currentRole === 'rider') return alert('骑手模式无法发单');

            const deliveryAddr = getDeliveryAddress();
            if(!deliveryAddr) return alert('请完善送达地址');

            const newTask = {
                type: document.getElementById('task-type').value,
                pickup: selectedPickup,
                delivery: deliveryAddr,
                reward: document.getElementById('reward').value,
                desc: document.getElementById('task-desc').value,
                deadline: document.getElementById('deadline').value,
                status: 'available',
                publisherId: currentUser.uid,
                publisherName: currentUser.email.split('@')[0],
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                expressNo: document.getElementById('express-no').value || '',
                mealNo: document.getElementById('meal-no').value || ''
            };

            try {
                await tasksRef.add(newTask);
                alert('✅ 发布成功！骑手大厅已同步');
                document.getElementById('publish-form').reset();
                navigateToSection('hall');
            } catch (err) {
                alert('发布失败：' + err.message);
            }
        };

        // 骑手接单逻辑
        window.takeOrder = async function(id) {
            if (currentRole !== 'rider') return alert('请切换为骑手身份后再接单');
            try {
                await tasksRef.doc(id).update({
                    status: 'taken',
                    riderId: currentUser.uid
                });
                alert('🎉 接单成功！请在“我的订单”中联系同学');
            } catch (err) {
                alert('接单失败：' + err.message);
            }
        };

        // 生成假订单逻辑
        window.generateFakeOrder = async function() {
            const types = ['代取快递', '代买饮料', '代取饭'];
            const locations = ['顺丰点', '一食堂', '南区超市', '瑞幸咖啡'];
            const fake = {
                type: types[Math.floor(Math.random()*types.length)],
                pickup: locations[Math.floor(Math.random()*locations.length)],
                delivery: '南区 5号楼 303',
                reward: 2,
                desc: '这是一条用于展示的演示订单',
                status: 'available',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                publisherName: '测试用户',
                mealNo: 'A' + Math.floor(Math.random()*100)
            };
            await tasksRef.add(fake);
        };

        // 导航与模式切换
        function renderNav() {
            const menu = document.getElementById('nav-menu');
            let html = `<a onclick="navigateToSection('home')" class="nav-link">首页</a>`;
            if (currentUser) {
                if (currentRole !== 'rider') html += `<a onclick="navigateToSection('publish')" class="nav-link">发布任务</a>`;
                html += `<a onclick="navigateToSection('hall')" class="nav-link">任务大厅</a>`;
                if (currentRole === 'rider') html += `<a onclick="navigateToSection('rider')" class="nav-link text-green-600 font-bold">骑手中心</a>`;
                html += `<a onclick="navigateToSection('orders')" class="nav-link">我的订单</a>`;
            }
            menu.innerHTML = html;
        }

        function toggleUIMode() {
            const isRider = currentRole === 'rider';
            document.getElementById('publish').classList.toggle('hidden', isRider);
            document.getElementById('rider').classList.toggle('hidden', !isRider);
            document.getElementById('hall').classList.toggle('hidden', false);
            document.getElementById('orders').classList.toggle('hidden', !currentUser);
        }

        // 身份验证逻辑 (已修复你的注册Bug)
        window.handleRegister = async function() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            if (password.length < 6) return alert('密码至少6位');
            try {
                const email = `${username}@campus-run.com`;
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCredential.user.uid).set({
                    username: username, roles: ['student', 'rider']
                });
                hideAuthModal();
                alert('注册成功！');
            } catch (e) { alert(e.message); }
        };

        window.handleLogin = async function() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            try {
                const email = `${username}@campus-run.com`;
                await auth.signInWithEmailAndPassword(email, password);
                hideAuthModal();
            } catch (e) { alert('登录失败，请检查用户名密码'); }
        };

        // 其他辅助功能
        window.quickPickup = (loc) => { selectedPickup = loc; document.getElementById('pickup-display').textContent = "已选：" + loc; };
        window.updateConditionalFields = () => {
            const type = document.getElementById('task-type').value;
            document.getElementById('express-field').style.display = type === '代取快递' ? 'block' : 'none';
            document.getElementById('meal-field').style.display = (type === '代买饮料' || type === '代取饭') ? 'block' : 'none';
        };
        window.updateDeliverySubOptions = () => {
            const type = document.getElementById('delivery-type').value;
            const sub = document.getElementById('delivery-sub');
            if(!type) { sub.innerHTML = ''; return; }
            sub.innerHTML = `
                <select id="building-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
                    ${type.includes('dorm') ? '<option>1号楼</option><option>2号楼</option><option>3号楼</option>' : '<option>存志楼</option><option>明德楼</option>'}
                </select>
                <input id="room-no" type="text" placeholder="门牌号 (如: 303)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
            `;
        };
        function getDeliveryAddress() {
            const type = document.getElementById('delivery-type').value;
            const b = document.getElementById('building-select')?.value;
            const r = document.getElementById('room-no')?.value;
            return type && b && r ? `${type === 'south-dorm'?'南区':type === 'north-dorm'?'北区':'教学楼'} ${b} ${r}` : null;
        }

        window.navigateToSection = (id) => document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        window.showAuthModal = () => document.getElementById('auth-modal').classList.remove('hidden');
        window.hideAuthModal = () => document.getElementById('auth-modal').classList.add('hidden');
        window.switchToRegister = () => { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); };
        window.switchToLogin = () => { document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); };
        window.showRoleDropdown = () => document.getElementById('role-dropdown').classList.toggle('hidden');
        window.hideRoleDropdown = () => document.getElementById('role-dropdown').classList.add('hidden');
        window.switchToRole = (role) => { currentRole = role; renderAfterLogin(); hideRoleDropdown(); };
        window.logout = () => auth.signOut().then(() => location.reload());

        function renderAfterLogin() {
            document.getElementById('auth-btn').classList.add('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('current-user-name').textContent = currentUser.email.split('@')[0];
            document.getElementById('current-role-badge').textContent = currentRole === 'rider' ? '🏍️ 骑手' : '👤 学生';
            renderNav();
            toggleUIMode();
        }

        // 初始化
        window.onload = () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    renderAfterLogin();
                    startSync(); // 登录后启动实时同步
                } else {
                    renderNav();
                }
            });
            // 简单的地图初始化
            if(window.BMap) {
                const map = new BMap.Map("map");
                map.centerAndZoom("苏州经贸职业技术学院", 16);
                map.addEventListener("click", e => {
                    selectedPickup = `坐标点: ${e.point.lng.toFixed(3)}, ${e.point.lat.toFixed(3)}`;
                    document.getElementById('pickup-display').textContent = "已选：" + selectedPickup;
                });
            }
        };
    </script>
</body>
</html>
