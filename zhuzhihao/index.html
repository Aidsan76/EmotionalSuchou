<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍跑腿小站 - 校园速递</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://api.map.baidu.com/api?v=3.0&ak=hYSRzaAqyf9QLJmm6oKM27cdDPmZSxeg"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

</head>
<body class="bg-gray-50 text-gray-900">

    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">

                <div>

                    <p class="text-xs text-green-600 -mt-1">苏州经贸职业技术学院 · 5分钟响应</p>
                </div>
            </div>

            <div id="nav-menu" class="hidden md:flex items-center gap-8 text-sm font-medium"></div>

            <div class="flex items-center gap-4">

                    <i class="fa-solid fa-user"></i><span>登录 / 注册</span>
                </button>

                    <div>

                        <div class="flex items-center gap-1 text-xs">

    <!-- 优雅角色切换下拉菜单 -->
    <div id="role-dropdown" onclick="if(event.target.id==='role-dropdown')hideRoleDropdown()" class="hidden fixed inset-0 bg-black/30 flex items-start justify-end pt-16 pr-6 z-[9999]">
        <div class="bg-white rounded-3xl shadow-xl w-64 py-2">
            <div onclick="switchToRole('student')" class="px-6 py-3 hover:bg-gray-100 flex items-center gap-3 cursor-pointer">👤 切换为学生模式</div>

    <!-- 登录/注册模态框 -->

            <h2 id="modal-title" class="text-2xl font-bold mb-6">登录 / 注册</h2>
            
            <div id="login-form">
                <input id="login-username" type="text" placeholder="用户名" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-green-500">
                <input id="login-password" type="password" placeholder="密码" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-green-500">

            <div id="register-form" class="hidden">

                <button onclick="switchToLogin()" class="w-full border border-gray-300 py-4 rounded-3xl text-gray-600">已有账号？去登录</button>
            </div>

    <!-- 首页 Hero -->

            <p class="text-xl mb-10 opacity-90">代取快递 · 代买饮料 · 代买小吃 · 代打印 · 代取饭 · 万能跑腿</p>

                            <div id="price-suggestion" class="bg-green-50 border border-green-200 rounded-2xl p-4 text-sm">

                                <span id="suggestion-text" class="text-green-600">餐饮类 2元，快递小件 2元，大件建议面议</span>

                            <div>
                                <label class="block text-sm font-medium mb-2">物品描述</label>

                                        <option value="2小时">2小时</option>

                                    <button type="button" onclick="quickPickup('顺丰')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">顺丰</button>
                                    <button type="button" onclick="quickPickup('苏州经贸快递服务点')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">苏州经贸快递服务点</button>
                                    <button type="button" onclick="quickPickup('瑞幸')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">瑞幸</button>
                                    <button type="button" onclick="quickPickup('蜜雪冰城')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">蜜雪冰城</button>
                                    <button type="button" onclick="quickPickup('衢州鸭脖')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">衢州鸭脖</button>
                                    <button type="button" onclick="quickPickup('正新鸡排')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">正新鸡排</button>
                                    <button type="button" onclick="quickPickup('0090汉堡工厂')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">0090汉堡工厂</button>
                                    <button type="button" onclick="quickPickup('南区超市')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">南区超市</button>
                                    <button type="button" onclick="quickPickup('北区超市')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">北区超市</button>
                                    <button type="button" onclick="quickPickup('经贸一食堂')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">经贸一食堂</button>
                                    <button type="button" onclick="quickPickup('经贸二食堂')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">经贸二食堂</button>
                                    <button type="button" onclick="quickPickup('经贸三食堂')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">经贸三食堂</button>
                                    <button type="button" onclick="quickPickup('经贸四食堂')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">经贸四食堂</button>
                                    <button type="button" onclick="quickPickup('经贸小食堂')" class="text-xs px-4 py-2 bg-gray-100 hover:bg-green-100 rounded-2xl">经贸小食堂</button>

    <!-- 任务大厅 -->
    <section id="hall" class="section py-16 bg-white hidden">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-8">任务大厅</h2>
            <div id="task-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <!-- 骑手中心 -->
    <section id="rider" class="section py-16 bg-white hidden">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-8">骑手中心</h2>
            <div id="rider-task-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <!-- 我的订单 -->
    <section id="orders" class="section py-16 bg-gray-50 hidden">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-6">我的订单</h2>
            <div id="my-orders-list" class="space-y-4"></div>
        </div>
    </section>

    <!-- 关于我们 -->
    <section id="about" class="section py-16 bg-gray-900 text-white">
        <div class="max-w-4xl mx-auto px-6">
            <h2 class="text-4xl font-bold mb-8">关于宿舍跑腿小站</h2>
            <p class="text-lg leading-relaxed">专为苏州经贸职业技术学院学生打造的校园跑腿平台。</p>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcU4vkg_xme3T6x_Rhp7HO4-maK11en94",
            authDomain: "emotionalsuchou.firebaseapp.com",
            projectId: "emotionalsuchou",
            storageBucket: "emotionalsuchou.firebasestorage.app",
            messagingSenderId: "594054359706",
            appId: "1:594054359706:web:b8af1cfd679b0a418c4d23",
            measurementId: "G-M92H8078T8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const tasksRef = db.collection('tasks');

        let currentUser = null;
        let currentRole = 'student';

        // 密码强度
        window.checkPasswordStrength = function() {
            const pwd = document.getElementById('reg-password').value;
            const bar = document.getElementById('strength-bar');
            let strength = 0;
            if (pwd.length >= 6) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            if (/[a-zA-Z]/.test(pwd)) strength++;
            if (pwd.length >= 8) strength++;
            const colors = ['#ef4444','#f59e0b','#eab308','#22c55e'];
            bar.style.backgroundColor = colors[strength-1] || '#ef4444';
            bar.style.width = (strength * 25) + '%';
        };

        let selectedRoles = [];
        window.selectRole = function(btn) {
            const role = btn.getAttribute('data-role');
            if (selectedRoles.includes(role)) {
                selectedRoles = selectedRoles.filter(r => r !== role);
                btn.classList.remove('border-green-500', 'bg-green-50');
            } else {
                selectedRoles.push(role);
                btn.classList.add('border-green-500', 'bg-green-50');
            }
        };

        // 注册（友好提示 email 已存在）
        window.handleRegister = async function() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            if (!username) return alert('用户名不能为空');
            if (password.length < 6) return alert('密码至少6位');
            if (!selectedRoles.length) return alert('请至少选择一个身份');

            try {
                const email = `${username}@campus-run.com`;
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCredential.user.uid).set({
                    username: username,
                    roles: selectedRoles,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                currentUser = userCredential.user;
                currentRole = selectedRoles[0];
                hideAuthModal();
                renderAfterLogin();
                alert(`✅ 注册成功！账号 ${username} 已拥有 ${selectedRoles.join(' 和 ')} 身份`);
            } catch (e) {
                if (e.code === 'auth/email-already-in-use') {
                    alert('❌ 用户名已被占用，请换一个用户名试试');
                } else {
                    alert('注册失败：' + e.message);
                }
            }
        };

        // 登录
        window.handleLogin = async function() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            try {
                const email = `${username}@campus-run.com`;
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                currentUser = userCredential.user;
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                currentRole = userDoc.exists ? userDoc.data().roles[0] : 'student';
                hideAuthModal();
                renderAfterLogin();
            } catch (e) {
                alert('登录失败：用户名或密码错误');
            }
        };

        function renderAfterLogin() {
            document.getElementById('auth-btn').classList.add('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('current-user-name').textContent = currentUser.email.split('@')[0];
            document.getElementById('current-role-badge').innerHTML = currentRole === 'rider' ? '🏍️ 骑手' : '👤 学生';
            renderNav();
            toggleMode();
        }

        function showRoleDropdown() {
            document.getElementById('role-dropdown').classList.remove('hidden');
            document.getElementById('role-dropdown').classList.add('flex');
        }
        function hideRoleDropdown() {
            const dd = document.getElementById('role-dropdown');
            dd.classList.add('hidden');
            dd.classList.remove('flex');
        }
        window.switchToRole = function(role) {
            currentRole = role;
            hideRoleDropdown();
            renderAfterLogin();
        };

        window.logout = function() {
            auth.signOut().then(() => {
                currentUser = null;
                document.getElementById('auth-btn').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
                renderNav();
                toggleMode();
            });
        };

        window.showAuthModal = function() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-modal').classList.add('flex');
            switchToLogin();
        };
        function hideAuthModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
        function switchToRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('modal-title').textContent = '注册账号';
            selectedRoles = [];
        }
        function switchToLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('modal-title').textContent = '登录';
        }

        // 配送至 + 门牌号/教室号
        window.updateDeliverySubOptions = function() {
            const type = document.getElementById('delivery-type').value;
            const subContainer = document.getElementById('delivery-sub');
            subContainer.innerHTML = '';
            if (!type) return;
            let html = '';
            if (type === 'teaching') {
                html = `<select id="teaching-building" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3">`;
                ['存志楼（1号教学楼）','明德楼（2号教学楼）','广才楼（3号教学楼）','弘毅楼（4号教学楼）','知行楼（5号教学楼）'].forEach(b => html += `<option value="${b}">${b}</option>`);
                html += `</select><select id="teaching-floor" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3"><option value="">楼层</option>`;
                for (let i = 1; i <= 5; i++) html += `<option value="${i}">第${i}层</option>`;
                html += `</select>`;
            } else {
                const dorms = type === 'south-dorm' ? ['1号楼','2号楼','3号楼','4号楼','5号楼','6号楼','7号楼','8号楼','9号楼','10号楼','11号楼','12号楼','17号楼'] : ['13号楼','14号楼','15号楼','16号楼','18号楼'];
                html = `<select id="dorm-building" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3">`;
                dorms.forEach(d => html += `<option value="${d}">${d}</option>`);
                html += `</select><select id="dorm-floor" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3"><option value="">楼层</option>`;
                for (let i = 1; i <= 5; i++) html += `<option value="${i}">第${i}层</option>`;
                html += `</select>`;
            }
            html += `<input id="room-no" type="text" placeholder="门牌号 / 教室号（例如 303）" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mt-2">`;
            subContainer.innerHTML = html;
        };

        function getDeliveryAddress() {
            const type = document.getElementById('delivery-type').value;
            if (!type) return '';
            const room = document.getElementById('room-no') ? document.getElementById('room-no').value.trim() : '';
            let addr = type === 'teaching' ? document.getElementById('teaching-building').value + ' 第' + document.getElementById('teaching-floor').value + '层' : 
                       (type === 'south-dorm' ? '南区 ' : '北区 ') + document.getElementById('dorm-building').value + ' 第' + document.getElementById('dorm-floor').value + '层';
            return room ? `${addr} ${room}` : addr;
        }

        window.handlePublish = function(e) {
            e.preventDefault();
            if (currentRole === 'rider') return alert('骑手模式下无法发布任务');
            alert('✅ 任务发布成功！');
        };

        function renderNav() {
            const menu = document.getElementById('nav-menu');
            let html = `<a onclick="navigateToSection('home')" class="nav-link cursor-pointer">首页</a>`;
            if (currentUser) {
                if (currentRole !== 'rider') html += `<a onclick="navigateToSection('publish')" class="nav-link cursor-pointer">发布任务</a>`;
                html += `<a onclick="navigateToHall()" class="nav-link cursor-pointer">任务大厅</a>`;
                html += `<a onclick="navigateToSection('orders')" class="nav-link cursor-pointer">我的订单</a>`;
                if (currentRole === 'rider') html += `<a onclick="navigateToSection('rider')" class="nav-link cursor-pointer text-green-600 font-semibold">骑手中心</a>`;
            }
            html += `<a onclick="navigateToSection('about')" class="nav-link cursor-pointer">关于我们</a>`;
            menu.innerHTML = html;
        }

        function toggleMode() {
            const isRider = currentRole === 'rider';
            document.getElementById('publish').style.display = isRider ? 'none' : 'block';
            document.getElementById('hall').classList.toggle('hidden', !isRider);
            document.getElementById('rider').classList.toggle('hidden', !isRider);
            document.getElementById('orders').classList.remove('hidden');
            // 切换到骑手时自动生成演示订单
            if (isRider) seedDemoTasks();
        }

        function seedDemoTasks() {
            tasksRef.get().then(snapshot => {
                if (snapshot.empty) {
                    const demoTasks = [
                        {type: '代取快递', pickup: '顺丰', delivery: '存志楼 第3层 303', reward: 2, desc: '一个中型包裹', deadline: '1小时', status: 'available', publisher: '李华', time: '刚刚'},
                        {type: '代买饮料', pickup: '瑞幸', delivery: '南区 5号楼 第3层 305', reward: 2, desc: '拿铁中杯', deadline: '30分钟', status: 'available', publisher: '张薇', time: '3分钟前'},
                        {type: '代买小吃', pickup: '衢州鸭脖', delivery: '北区 14号楼 第2层 208', reward: 2, desc: '鸭脖一份', deadline: '1.5小时', status: 'available', publisher: '王磊', time: '10分钟前'}
                    ];
                    demoTasks.forEach(task => tasksRef.add(task));
                }
            });
        }

        function navigateToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
        function navigateToHall() { document.getElementById('hall').scrollIntoView({ behavior: 'smooth' }); }

        function main() {
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    renderAfterLogin();
                }
            });
            console.log('%c✅ 最终版代码已加载，所有问题已修复', 'color:#22c55e;font-size:13px');
        }
        window.onload = main;
    </script>
</body>
</html>
