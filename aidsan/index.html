<!DOCTYPE html>
<html lang="zh-CN">  <!-- 改成 zh-CN 更适合你的内容 -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="img/touxiang.png">
  <title>USED TO BE SAD - FROM NANJING</title>

  <style>
    /* ================== 全局基础样式 ================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: '一点明体', 'Roboto', sans-serif !important;
    }

    html, body {
      height: 100%;                    /* 改用 100% + JS 动态 --vh */
      min-height: 100%;
      overflow: hidden;
      background: #000;                /* 先给纯黑兜底，防止背景闪烁 */
    }

    body {
      background: url('img/background.png') center/cover no-repeat;
      background-attachment: scroll;   /* 移动端改成 scroll，避免 fixed 问题 */
      cursor: none;
    }

    /* 动态视口高度修复（解决 100vh 抖动） */
    :root {
      --vh: 100vh;   /* 后面 JS 会动态更新 */
    }

    /* ================== 加载页 ================== */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      color: #fff;
      z-index: 999999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-spin {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text { font-size: 14px; letter-spacing: 2px; opacity: 0.8; }

    @font-face {
      font-family: '一点明体';
      src: url('./fonts/一点明体.woff2') format('woff2');
      font-display: swap;
    }

    /* ================== 轮播 ================== */
    .carousel {
      position: relative;
      width: 100%;
      height: 100dvh;           /* 优先用 dvh（动态视口），兼容性好 */
      height: calc(var(--vh, 1vh) * 100);  /* JS 兜底 */
    }

    .carousel-item {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
      z-index: 0;
    }

    .carousel-item.active {
      opacity: 1;
      z-index: 1;
    }

    .carousel-box {
      position: relative;
      text-align: center;
      color: #fff;
    }

    .carousel-box img {
      max-width: 65vh;
      max-height: 65vh;
      width: auto;
      height: auto;
      object-fit: contain;
      opacity: 0.9;
    }

    .title {
      position: absolute;
      top: -70px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      letter-spacing: 2px;
      white-space: nowrap;
      font-weight: 300;
      width: 90vw;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6); /* 增加可读性 */
    }

    /* 按钮 */
    .title-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;           /* 移动端稍大一点 */
      color: #fff;
      z-index: 999;
      padding: 15px 25px;
      user-select: none;
      opacity: 0.85;
      transition: opacity 0.3s;
    }

    .title-btn:hover, .title-btn:active { opacity: 1; }

    .prev-btn { left: 5%; }
    .next-btn { right: 5%; }

    /* 小点 */
    .dots {
      position: fixed;
      bottom: 60px;              /* 移动端上移一点 */
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 999;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.3s;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* 底部版权和社交 */
    .layout {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 999;
      color: #fff;
      font-size: 11px;
      line-height: 1.5;
      opacity: 0.7;
    }

    .social {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 25px;
      z-index: 999;
    }

    .social img {
      width: 34px;
      opacity: 0.75;
      transition: opacity 0.3s;
    }

    .social img:hover { opacity: 1; }

    /* 自定义光标 - 只在桌面显示 */
    #customCursor {
      display: none;   /* 默认隐藏 */
      position: fixed;
      width: 35px;
      height: 35px;
      pointer-events: none;
      z-index: 99999;
    }

    /* ================== 移动端优化 ================== */
    @media screen and (max-width: 768px) {
      .carousel-box img {
        max-width: 82vw !important;   /* 改用 vw，更适应不同屏幕比例 */
        max-height: 55vh !important;
      }

      .title {
        top: -48px !important;
        font-size: 15px !important;
        white-space: normal;          /* 标题太长时允许换行 */
        text-align: center;
      }

      .title-btn {
        font-size: 32px;
        padding: 20px;
      }

      .prev-btn { left: 8px; }
      .next-btn { right: 8px; }

      .dots { bottom: 45px; }
      .dot { width: 10px; height: 10px; }
    }

    /* 额外：横屏时稍微调整图片 */
    @media screen and (orientation: landscape) and (max-width: 768px) {
      .carousel-box img {
        max-height: 75vh !important;
      }
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-spin"></div>
  <div class="loader-text">LOADING</div>
</div>

<div class="carousel">
  <!-- 你的 carousel-item 保持不变 -->
  <div class="carousel-item active"> ... </div>
  <!-- 其余 item ... -->
</div>

<div class="title-btn prev-btn">←</div>   <!-- 建议加个箭头，更明显 -->
<div class="title-btn next-btn">→</div>
<div class="dots"></div>

<div class="layout">
  © 2025-2026 USED TO BE SAD <br>All Rights Reserved<br>Powered by Aidsan®
</div>

<div class="social">
  <a href="..." target="_blank"><img loading="lazy" src="img/XiaohongshuLOGO.png" alt="小红书"></a>
  <a href="..." target="_blank"><img loading="lazy" src="img/Bilibili_logo.svg" alt="Bilibili"></a>
</div>

<img id="customCursor" src="img/turtledove.png" alt="">

<script src="script.js"></script>
</body>
</html>
