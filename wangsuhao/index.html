<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽车爱好者之家</title>
    <style>
        :root { 
            --bg-color: #f7f8fa;
            --text-color: #2c3e50;
            --card-bg: #fff;
            --border-color: #eee;
            --shadow-color: rgba(0,0,0,0.08);
            --country-color: #e74c3c;
            --btn-bg: #fff;
            --btn-active: #409eff;
        }
        body.dark {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --border-color: #333;
            --shadow-color: rgba(0,0,0,0.3);
            --country-color: #ff5555;
            --btn-bg: #2a2a2a;
            --btn-active: #409eff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 20px;
            transition: all 0.3s ease;
        }
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 9998;
        }
        #overlay.show {
            opacity: 1;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 9997;
        }
        header h1 {
            color: var(--text-color);
            font-size: 26px;
            margin-bottom: 12px;
        }
        .tool-bar {
            max-width: 700px;
            margin: 0 auto 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        #themeToggle, #showCollection {
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px var(--shadow-color);
        }
        #themeToggle:hover, #showCollection:hover {
            transform: scale(1.05);
        }
        .filter-bar {
            max-width: 700px;
            margin: 0 auto 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .filter-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 15px;
            background: var(--btn-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            box-shadow: 0 1px 4px var(--shadow-color);
        }
        .filter-btn.active {
            background: var(--btn-active);
            color: #fff;
        }
        .car-list {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 9999;
        }
        .car-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px 0;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            transition: all 0.3s ease;
            width: 100%;
            min-height: 80px;
            z-index: 1;
        }
        .car-list:hover .car-item {
            filter: grayscale(100%) opacity(0.6);
            transition: filter 0.3s ease;
        }
        .car-list .car-item.hovered {
            filter: grayscale(0%) opacity(1) !important;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 6px 20px var(--shadow-color);
            z-index: 10;
        }
        .car-icon-container {
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: transform 0.4s ease;
            width: 200px;
            justify-content: center;
            flex-direction: row;
        }
        .car-item.hovered .car-icon-container {
            transform: translateX(-260px);
            flex-direction: column;
            gap: 8px;
        }
        .car-icon {
            width: 58px;
            height: 58px;
            object-fit: contain;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }
        .car-item.hovered .car-icon {
            transform: scale(1.08);
        }
        .car-name {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-color);
            white-space: nowrap;
        }
        .collect-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #ccc;
            z-index: 20;
        }
        .collect-btn.active {
            color: #ffda44;
        }
        .car-info {
            position: absolute;
            left: 220px;
            top: 50%;
            transform: translateY(-50%) translateX(-30px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease 0.05s;
            min-width: 320px;
        }
        .car-item.hovered .car-info {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
            pointer-events: auto;
        }
        .car-country {
            display: inline-block;
            font-size: 14px;
            color: var(--country-color);
            font-weight: bold;
            margin-bottom: 6px;
        }
        .car-description {
            font-size: 15px;
            color: var(--text-color);
            line-height: 1.5;
            font-weight: 500;
        }
        .empty-tip {
            text-align: center;
            padding: 40px 0;
            color: #999;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <header>
        <h1>汽车爱好者之家</h1>
        <div class="tool-bar">
            <button id="themeToggle">切换暗黑模式</button>
            <button id="showCollection">返回全部</button>
        </div>
    </header>
    <div class="filter-bar" id="filterBar"><button class="filter-btn active">全部</button><button class="filter-btn ">中国</button><button class="filter-btn ">韩国</button><button class="filter-btn ">法国</button><button class="filter-btn ">美国</button><button class="filter-btn ">德国</button><button class="filter-btn ">日本</button></div>
    <main class="car-list" id="car-container"><div class="empty-tip">暂无数据</div></main>

    <script>
        const carData = [
            {name:"小米",img:"https://g.autoimg.cn/@img/car2/cardfs/series/g31/M06/F6/30/300x_autohomecar__ChxoHWWovsiALvUfAAA_yvHOuLo703.png?format=webp",url:"https://www.xiaomiev.com/",country:"中国",desc:"中国科技巨头跨界打造的智能化新能源汽车品牌。"},
            {name:"小鹏",img:"https://g.autoimg.cn/@img/car2/cardfs/series/g27/M05/82/77/200x_autohomecar__ChxkmWTIoSiAZ3opAABdaZ_O9N8413.png?format=webp",url:"https://www.xiaopeng.com/",country:"中国",desc:"主打前沿智能驾驶技术的领先新能源汽车制造商。"},
            {name:"现代",img:"https://g.autoimg.cn/@img/car2/cardfs/series/g26/M09/FA/6F/200x_autohomecar__ChxkjmS-NemAJ1l5AADS2hdXDb4846.png?format=webp",url:"https://www.hyundai.com.cn/",country:"韩国",desc:"韩国最大的汽车制造企业，全球知名老牌车企。"},
            {name:"雪铁龙",img:"https://g.autoimg.cn/@img/car2/cardfs/series/g28/M07/08/43/200x_autohomecar__ChxkmmS-HwyAepvnAAGOTMwZJGk190.png?format=webp",url:"https://www.dongfeng-citroen.com.cn/",country:"法国",desc:"底盘调校极佳、设计独具浪漫气息的百年法国品牌。"},
            {name:"雪佛兰",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g28/M00/00/6D/200x_autohomecar__CjIFVGTLPP6AWCbsAAGNwCRoNI4170.png?format=webp",url:"https://www.chevrolet.com.cn/",country:"美国",desc:"通用汽车旗下历史悠久且销量庞大的大众化品牌。"},
            {name:"奔驰",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g34/M04/03/95/300x_autohomecar__ChtpWGleMjGAf8pvAAB5t1cGb6U095.png?format=webp",url:"https://www.mercedes-benz.com.cn/",country:"德国",desc:"汽车的发明者，全球顶尖的豪华汽车品牌代表。"},
            {name:"大众",img:"https://g.autoimg.cn/@img/car2/cardfs/series/g25/M04/8A/B7/200x_autohomecar__ChxkqWTIopKATYsBAADh7WLPOs8850.png?format=webp",url:"https://www.vw.com.cn/",country:"德国",desc:"欧洲最大的汽车制造集团，以皮实耐用著称。"},
            {name:"本田",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g25/M02/EA/7D/200x_autohomecar__CjIFV2TLOVeAMnSOAAG1Wd7Mgow764.png?format=webp",url:"https://www.honda.com.cn/",country:"日本",desc:"以卓越的发动机技术和可靠性闻名全球的品牌。"},
            {name:"丰田",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g25/M06/CA/43/200x_autohomecar__CjIFV2TCOiiAQiQ0AAE0By3ZgZM165.png?format=webp",url:"https://www.toyota.com.cn/",country:"日本",desc:"全球规模最大的汽车制造商之一，主打经济耐用。"},
            {name:"宝马",img:"https://g.autoimg.cn/@img/car2/cardfs/series/g28/M08/10/45/200x_autohomecar__CjIFVGUNeJWAOukrAADdG-QkWXI004.png?format=webp",url:"https://www.bmw.com.cn/",country:"德国",desc:"享誉世界的豪华汽车品牌，以极致的操控性能为核心。"},
            {name:"奥迪",img:"https://g.autoimg.cn/@img/car2/cardfs/series/g28/M01/F6/71/200x_autohomecar__CjIFVGTIoWqAdlH5AABfFDX2Peo393.png?format=webp",url:"https://www.audi.cn/",country:"德国",desc:"以'突破科技，启迪未来'为理念的豪华汽车品牌。"},
            {name:"别克",img:"https://g.autoimg.cn/@img/car2/cardfs/series/g28/M0A/B9/6F/200x_autohomecar__ChxkmmSn2EGAYQsbAAL_cEgVf_0744.png?format=webp",url:"https://www.buick.com.cn/",country:"美国",desc:"通用汽车旗下，在中国市场深受欢迎的商务及家用品牌。"},
            {name:"比亚迪",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g27/M0B/39/7F/200x_autohomecar__CjIFVWTLOcOAIopLAABKh3_XoY8154.png?format=webp",url:"https://www.byd.com/",country:"中国",desc:"掌握核心三电技术的全球新能源汽车销量领导者。"},
            {name:"吉利汽车",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g28/M01/14/02/200x_autohomecar__ChxkmmTCDuGAHSjSAABF02FAqfo394.png?format=webp",url:"https://www.geely.com/",country:"中国",desc:"中国领先的自主乘用车品牌，拥有庞大的品牌矩阵。"},
            {name:"日产",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g28/M03/0B/A6/200x_autohomecar__ChxkmmS_YSyABzW1AACF5KOWKG4298.png?format=webp",url:"https://www.dongfeng-nissan.com.cn/",country:"日本",desc:"技术实力雄厚的日系三强之一，有着'移动大沙发'的美誉。"},
            {name:"理想",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g25/M08/8A/B2/200x_autohomecar__ChxkqWTIomiAFUvNAAA-eoZCHcM173.png?format=webp",url:"https://www.lixiang.com/",country:"中国",desc:"精准定位家庭用户的中国豪华智能电动车品牌。"},
            {name:"零跑",img:"https://g.autoimg.cn/@img/car3/cardfs/series/g28/M01/DF/3B/200x_autohomecar__CjIFVGTCBWqAPSYzAABJ8HYHW6o681.png?format=webp",url:"https://www.leapmotor.com/",country:"中国",desc:"坚持全域自研的科技型智能电动汽车企业。"}
        ];

        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        function initTheme(){
            const isDark = localStorage.getItem('theme') === 'dark';
            if(isDark){
                document.body.classList.add('dark');
                themeToggle.textContent = '切换白天模式';
            }
        }
        themeToggle.addEventListener('click',()=>{
            document.body.classList.toggle('dark');
            const isDarkNow = document.body.classList.contains('dark');
            localStorage.setItem('theme',isDarkNow ? 'dark':'light');
            themeToggle.textContent = isDarkNow ? '切换白天模式':'切换暗黑模式';
        });
        initTheme();

        // 收藏核心
        function getCollection(){
            return JSON.parse(localStorage.getItem('collection')||'[]');
        }
        function toggleCollect(carName){
            let list = getCollection();
            const index = list.indexOf(carName);
            if(index !== -1){
                list.splice(index,1);
            }else{
                list.push(carName);
            }
            localStorage.setItem('collection',JSON.stringify(list));
            renderList();
        }

        let currentCountry = '全部';
        let showCollectionMode = false;
        const countries = ['全部',...new Set(carData.map(item=>item.country))];
        const container = document.getElementById('car-container');
        const overlay = document.getElementById('overlay');
        const filterBar = document.getElementById('filterBar');
        const showCollectionBtn = document.getElementById('showCollection');

        // 渲染筛选按钮
        function renderFilter(){
            filterBar.innerHTML = '';
            countries.forEach(c=>{
                const btn = document.createElement('button');
                btn.className = `filter-btn ${c === currentCountry ? 'active':''}`;
                btn.textContent = c;
                btn.onclick = ()=>{
                    currentCountry = c;
                    showCollectionMode = false;
                    showCollectionBtn.textContent = '查看收藏夹';
                    renderFilter();
                    renderList();
                };
                filterBar.appendChild(btn);
            });
        }

        // 查看收藏夹
        showCollectionBtn.addEventListener('click',()=>{
            showCollectionMode = !showCollectionMode;
            showCollectionBtn.textContent = showCollectionMode ? '返回全部':'查看收藏夹';
            currentCountry = '全部';
            renderFilter();
            renderList();
        });

        // 渲染列表
        function renderList(){
            container.innerHTML = '';
            let data = [...carData];
            const collectedList = getCollection();

            if(showCollectionMode){
                data = data.filter(item=>collectedList.includes(item.name));
            }else{
                if(currentCountry !== '全部'){
                    data = data.filter(item=>item.country === currentCountry);
                }
            }

            data.sort((a,b)=>a.name.localeCompare(b.name,'zh-CN'));

            if(data.length === 0){
                container.innerHTML = `<div class="empty-tip">暂无数据</div>`;
                return;
            }

            data.forEach(car=>{
                const item = document.createElement('div');
                item.className = 'car-item';
                const isCollected = collectedList.includes(car.name);

                item.innerHTML = `
                    <div class="car-icon-container">
                        <img src="${car.img}" class="car-icon">
                        <div class="car-name">${car.name}</div>
                    </div>
                    <button class="collect-btn ${isCollected ? 'active':''}">⭐</button>
                    <div class="car-info">
                        <span class="car-country">${car.country}</span>
                        <div class="car-description">${car.desc}</div>
                    </div>
                `;

                const iconBox = item.querySelector('.car-icon-container');
                iconBox.addEventListener('mouseenter',()=>{
                    document.querySelectorAll('.car-item.hovered').forEach(i=>i.classList.remove('hovered'));
                    item.classList.add('hovered');
                    overlay.classList.add('show');
                });
                item.addEventListener('mouseleave',()=>{
                    item.classList.remove('hovered');
                    overlay.classList.remove('show');
                });
                iconBox.addEventListener('click',()=>{
                    window.open(car.url,'_blank');
                });

                // 收藏点击（修复事件冒泡+实时刷新）
                const collectBtn = item.querySelector('.collect-btn');
                collectBtn.addEventListener('click',(e)=>{
                    e.stopPropagation();
                    toggleCollect(car.name);
                });
                container.appendChild(item);
            });
        }

        renderFilter();
        renderList();
    </script>

</body></html>
